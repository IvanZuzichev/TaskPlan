<div class="add-task-container">
  <h3>+ Добавить новую заметку</h3>
  
  <div class="form-group">
    <label for="title">Название заметки (до 40 символов):</label>
    <input 
      type="text" 
      id="title"
      [(ngModel)]="title"
      maxlength="40"
      placeholder="Введите название заметки..."
      class="title-input">
    <small>{{ title().length }}/40</small>
  </div>
  
  <div class="form-row">
    <div class="form-group">
      <label>Время выполнения:</label>
      <select [(ngModel)]="timePriority" class="select-input">
        <option value="fast">Быстро (Зеленый)</option>
        <option value="medium">Средне (Желтый)</option>
        <option value="long">Долго (Красный)</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Приоритет выполнения:</label>
      <select [(ngModel)]="taskPriority" class="select-input">
        <option value="urgent">Срочно (Красный)</option>
        <option value="normal">По очереди (Желтый)</option>
        <option value="delayed">Не срочно (Зеленый)</option>
      </select>
    </div>
  </div>
  
  <button 
    (click)="addTask()" 
    [disabled]="!title().trim()"
    class="add-btn">
    + Добавить заметку
  </button>
</div>
